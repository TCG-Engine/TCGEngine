<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Editor</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #202124;
            color: #e8eaed;
        }
        button, input, textarea, select {
            font: inherit;
        }
        button {
            border: 1px solid #4d5156;
            background: #2f6f73;
            color: #ffffff;
            border-radius: 6px;
            min-height: 34px;
            padding: 7px 12px;
            cursor: pointer;
        }
        button:hover { background: #368186; }
        button.danger, .danger { background: #8a3a3a; }
        button.danger:hover, .danger:hover { background: #a34747; }
        input, textarea, select {
            width: 100%;
            background: #2b2c30;
            color: #f1f3f4;
            border: 1px solid #4d5156;
            border-radius: 6px;
            min-height: 34px;
            padding: 7px 9px;
        }
        textarea {
            min-height: 90px;
            resize: vertical;
        }
        label {
            display: grid;
            gap: 5px;
            color: #bdc1c6;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        label span {
            text-transform: none;
            font-weight: 400;
            color: #9aa0a6;
        }
        .app {
            display: grid;
            grid-template-columns: 190px 1fr;
            height: 100vh;
        }
        .nav {
            background: #18191b;
            border-right: 1px solid #3c4043;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .brand {
            padding: 18px 16px;
            border-bottom: 1px solid #3c4043;
        }
        .brand strong {
            display: block;
            color: #ffffff;
            font-size: 16px;
        }
        .brand span {
            display: block;
            color: #9aa0a6;
            font-size: 12px;
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .nav button {
            background: transparent;
            border: 0;
            border-radius: 0;
            color: #bdc1c6;
            min-height: 44px;
            padding: 0 16px;
            text-align: left;
        }
        .nav button:hover, .nav button.active {
            background: #283f42;
            color: #ffffff;
        }
        .main {
            min-width: 0;
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }
        .topbar {
            min-height: 54px;
            background: #242529;
            border-bottom: 1px solid #3c4043;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
        }
        .topbar h1 {
            font-size: 16px;
            margin: 0;
        }
        .topbar-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            color: #9aa0a6;
            font-size: 12px;
        }
        .topbar-meta a,
        .link-button {
            color: #8fd6dc;
            text-decoration: none;
        }
        .topbar-meta a:hover,
        .link-button:hover {
            color: #ffffff;
            text-decoration: underline;
        }
        #userLabel {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .link-button {
            min-height: 0;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            font-size: 12px;
        }
        .link-button:hover {
            background: transparent;
        }
        .save-state.saving { color: #fdd663; }
        .save-state.saved { color: #9fd6b5; }
        .save-state.error { color: #ffb4ab; }
        #content {
            min-height: 0;
            overflow: hidden;
        }
        .workbench, .template-workbench, .card-workbench, .ability-workbench {
            height: 100%;
            min-height: 0;
            display: grid;
            gap: 1px;
            background: #3c4043;
        }
        .two-column { grid-template-columns: minmax(260px, 34%) 1fr; }
        .template-workbench { grid-template-columns: 230px 310px 1fr 250px; }
        .card-workbench { grid-template-columns: 250px minmax(320px, 420px) 1fr; }
        .ability-workbench { grid-template-columns: 280px 1fr; }
        .pane {
            background: #202124;
            min-width: 0;
            min-height: 0;
            overflow: auto;
            padding: 16px;
        }
        .pane.compact { padding: 12px; }
        .pane-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .pane-head.spaced { margin-top: 16px; }
        .pane-head h2 {
            margin: 0;
            font-size: 15px;
        }
        .list {
            display: grid;
            gap: 6px;
        }
        .list.tight { gap: 4px; }
        .list-row {
            width: 100%;
            display: grid;
            gap: 3px;
            text-align: left;
            background: #292a2e;
            border-color: #3c4043;
        }
        .list-row.active {
            background: #315d60;
            border-color: #5fb3b3;
        }
        .list-row strong {
            color: #ffffff;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .list-row span {
            color: #aeb4b9;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stack-form {
            display: grid;
            gap: 12px;
            max-width: 620px;
        }
        .stack-form.mini {
            margin-top: 14px;
            gap: 9px;
        }
        .form-section {
            display: grid;
            gap: 8px;
            padding: 10px;
            border: 1px solid #3c4043;
            border-radius: 6px;
            background: #17191c;
        }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .tag-editor, .tag-row {
            display: grid;
            gap: 8px;
        }
        .tag-row {
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
        }
        .compact-empty {
            padding: 8px;
            min-height: auto;
        }
        .tag-filter {
            display: grid;
            gap: 6px;
            margin-bottom: 10px;
        }
        .tag-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tag-badges em {
            max-width: 100%;
            padding: 2px 6px;
            border-radius: 999px;
            background: #3b4550;
            color: #d7edf0;
            font-style: normal;
            font-size: 11px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tag-checkboxes {
            display: grid;
            gap: 6px;
            padding: 10px;
            border: 1px solid #3c4043;
            border-radius: 6px;
        }
        .tag-checkboxes legend {
            padding: 0 4px;
            color: #dfe5ea;
            font-size: 13px;
            font-weight: 700;
        }
        .enum-editor, .enum-row, .enum-options {
            display: grid;
            gap: 10px;
        }
        .enum-row {
            padding: 10px;
            border: 1px solid #3c4043;
            border-radius: 6px;
            background: #202124;
        }
        .enum-row-head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 8px;
            align-items: center;
        }
        .enum-option-row {
            display: grid;
            grid-template-columns: minmax(90px, 1fr) minmax(90px, 1fr) minmax(120px, 1fr) 34px minmax(120px, 1fr) auto;
            gap: 6px;
            align-items: center;
        }
        .enum-icon-preview {
            width: 28px;
            height: 28px;
            border: 1px solid #3c4043;
            border-radius: 4px;
            background: #111315;
            object-fit: contain;
        }
        .enum-icon-preview.empty {
            display: inline-block;
        }
        .button-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }
        .summary-grid div {
            border: 1px solid #3c4043;
            border-radius: 6px;
            padding: 14px;
            background: #292a2e;
        }
        .summary-grid strong {
            display: block;
            font-size: 26px;
        }
        .summary-grid span {
            color: #aeb4b9;
            font-size: 12px;
        }
        .json-output {
            width: 100%;
            height: calc(100vh - 128px);
            font-family: Consolas, monospace;
            font-size: 12px;
        }
        .fields-list {
            display: grid;
            gap: 10px;
        }
        .field-row {
            display: grid;
            gap: 8px;
            padding: 10px;
            border: 1px solid #3c4043;
            border-radius: 6px;
            background: #292a2e;
        }
        .field-row-head {
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
        }
        .field-toggle {
            width: 28px;
            min-height: 28px;
            padding: 0;
            font-family: Consolas, monospace;
        }
        .field-summary {
            min-width: 0;
            display: grid;
            gap: 2px;
            padding: 4px 0;
            border: 0;
            background: transparent;
            text-align: left;
        }
        .field-summary:hover {
            background: transparent;
            border: 0;
        }
        .field-summary strong,
        .field-summary span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .field-summary strong {
            color: #ffffff;
            font-size: 13px;
        }
        .field-summary span {
            color: #aeb4b9;
            font-size: 11px;
            text-transform: none;
        }
        .field-row-body {
            display: grid;
            gap: 8px;
        }
        .field-row-body[hidden] {
            display: none;
        }
        .field-actions {
            display: grid;
            gap: 8px;
        }
        button:disabled, input:disabled, textarea:disabled, select:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .canvas-pane {
            padding: 0;
            overflow: hidden;
        }
        .canvas-toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #242529;
            border-bottom: 1px solid #3c4043;
        }
        .canvas-toolbar select {
            width: 100px;
        }
        .canvas-scroll {
            height: calc(100vh - 106px);
            overflow: auto;
            padding: 18px;
        }
        .canvas-scale, .preview-scale {
            position: relative;
            margin: 0 auto;
        }
        .template-canvas, .card-preview-canvas {
            position: relative;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
        }
        .canvas-el, .preview-el {
            position: absolute;
            overflow: hidden;
        }
        .canvas-el {
            border: 1px dashed #315d60;
            background: rgba(95, 179, 179, 0.12);
            color: #101314;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
        }
        .canvas-el.selected {
            border: 2px solid #d9ead3;
            background: rgba(217, 234, 211, 0.25);
        }
        .canvas-el span {
            background: rgba(255,255,255,0.75);
            color: #111111;
            padding: 2px 5px;
            border-radius: 4px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }
        .canvas-el i {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            background: #d9ead3;
            border-left: 1px solid #315d60;
            border-top: 1px solid #315d60;
            cursor: nwse-resize;
        }
        .inspector {
            display: grid;
            gap: 10px;
        }
        .inspector h3 {
            margin: 0 0 2px;
            font-size: 14px;
        }
        .preview-pane {
            display: grid;
            grid-template-rows: auto 1fr;
        }
        #cardPreviewHost {
            overflow: auto;
            min-height: 0;
            padding: 12px;
        }
        .preview-el.image-el img {
            width: 100%;
            height: 100%;
            display: block;
        }
        .canvas-el.image-layer {
            background: rgba(216, 169, 81, 0.14);
            border-color: #d8a951;
        }
        .canvas-el img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }
        .asset-line {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }
        .wide-select {
            width: 100%;
            margin-bottom: 10px;
        }
        .inline-filter {
            display: flex;
            grid-template-columns: none;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
            text-transform: none;
            font-weight: 500;
        }
        .inline-filter input {
            width: 16px;
            min-height: 16px;
        }
        .editor-wrapper {
            height: 100%;
            display: flex;
            gap: 20px;
        }
        .card-image-sidebar {
            width: 200px;
            flex: 0 0 auto;
        }
        .card-image-container {
            width: 100%;
            aspect-ratio: 5 / 7;
            border: 1px solid #3c4043;
            border-radius: 6px;
            background: #292a2e;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9aa0a6;
            text-align: center;
            padding: 10px;
        }
        .card-image-container.square { aspect-ratio: 1 / 1; }
        .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .editor-container {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #3c4043;
            margin-bottom: 12px;
        }
        .card-info h2 {
            margin: 0 0 4px;
            font-size: 18px;
        }
        .card-info p {
            margin: 0;
            color: #9aa0a6;
            font-size: 12px;
        }
        .abilities-area {
            overflow: auto;
            flex: 1;
            display: grid;
            align-content: start;
            gap: 12px;
        }
        .ability-editor {
            border: 1px solid #3c4043;
            border-radius: 6px;
            background: #292a2e;
            padding: 12px;
        }
        .ability-header {
            display: grid;
            grid-template-columns: minmax(160px, 260px) 1fr auto auto;
            gap: 10px;
            align-items: end;
            margin-bottom: 10px;
        }
        .form-group {
            display: grid;
            gap: 5px;
        }
        .inline-checkbox {
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .inline-checkbox input {
            width: 16px;
            min-height: 16px;
        }
        .inline-checkbox label {
            text-transform: none;
            font-weight: 500;
        }
        .code-editor {
            width: 100%;
            min-height: 150px;
            font-family: Consolas, monospace;
            font-size: 12px;
        }
        .footer {
            color: #9aa0a6;
            font-size: 12px;
            padding-top: 10px;
        }
        .empty-state, .loading {
            color: #9aa0a6;
            padding: 18px;
            text-align: center;
        }
        .page-empty {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-message, .success-message, .info-message {
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .error-message { background: #4f2525; color: #ffd6d6; border: 1px solid #8a3a3a; }
        .success-message { background: #1f4a3d; color: #d9ead3; border: 1px solid #2f6f73; }
        .info-message { background: #263d4c; color: #d7ecff; border: 1px solid #3f647a; }
        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            max-width: 360px;
            padding: 10px 12px;
            border-radius: 6px;
            background: #1f4a3d;
            color: #ffffff;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: opacity 0.16s, transform 0.16s;
            z-index: 20;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.error { background: #8a3a3a; }
        .toast.info { background: #3f647a; }
        .modal-backdrop {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(0, 0, 0, 0.62);
            z-index: 30;
        }
        .auth-modal {
            width: min(420px, 100%);
            display: grid;
            gap: 14px;
            padding: 18px;
            border: 1px solid #4d5156;
            border-radius: 8px;
            background: #202124;
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.4);
        }
        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .modal-head h2 {
            margin: 0;
            font-size: 18px;
        }
        .icon-button {
            width: 32px;
            min-height: 32px;
            padding: 0;
            font-family: Consolas, monospace;
        }
        .modal-switch {
            display: flex;
            justify-content: center;
        }
        @media (max-width: 1100px) {
            .template-workbench { grid-template-columns: 220px 280px 1fr; }
            .inspector-pane { display: none; }
            .card-workbench { grid-template-columns: 230px 1fr; }
            .preview-pane { display: none; }
        }
    </style>
</head>
<body>
    <div class="app">
        <nav class="nav">
            <div class="brand">
                <strong>Card Editor</strong>
                <span id="contextLabel">Loading</span>
            </div>
            <button data-screen="games">Games</button>
            <button data-screen="templates">Templates</button>
            <button data-screen="sets">Sets</button>
            <button data-screen="cards">Cards</button>
            <button data-screen="export">Export</button>
            <button data-screen="abilities">Abilities</button>
        </nav>
        <main class="main">
            <header class="topbar">
                <h1>Card and Set Authoring</h1>
                <div class="topbar-meta">
                    <span id="userLabel"></span>
                    <span id="saveState" class="save-state"></span>
                </div>
            </header>
            <div id="content"></div>
        </main>
    </div>
    <div id="toast" class="toast"></div>
    <div id="authModalHost"></div>

    <script src="AbilityEditor.js"></script>
    <script src="ApiClient.js"></script>
    <script src="AutoSave.js"></script>
    <script src="PreviewRenderer.js"></script>
    <script src="AssetPicker.js"></script>
    <script src="GameScreen.js"></script>
    <script src="SetScreen.js"></script>
    <script src="TemplateCanvas.js"></script>
    <script src="TemplateScreen.js"></script>
    <script src="CardScreen.js"></script>
    <script src="ExportScreen.js"></script>
    <script src="AppShell.js"></script>
</body>
</html>
